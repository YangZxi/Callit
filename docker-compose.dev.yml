services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: app-dev
    container_name: callit-dev-app
    working_dir: /app
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN:-123123}
      SERVER_PORT: 3100
      DATA_DIR: /app/data
      DATABASE_PATH: /app/data/app.db
      WORKERS_DIR: /app/data/workers
      WORKER_RUNNING_TEMP_DIR: /app/data/tmp
      CHAT_SESSIONS_DIR: /app/data/chat-sessions
      RUNTIME_LIB_DIR: /app/data/.lib
      TZ: ${TZ:-Asia/Shanghai}
      # - ENABLE_CGROUP_V2=true # 启用后，还需要挂载 /sys/fs/cgrou
    ports:
      - "3100:3100"
    volumes:
      - ./:/app
      - ./data:/app/data
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      # - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - systempaths=unconfined
    # privileged: true
    command: ["go", "run", "./cmd"]

volumes:
  go-mod-cache:
  go-build-cache:
