services:
  callit:
    image: yangzxi/callit:latest
    container_name: callit
    environment:
      # - ADMIN_PREFIX=admin   # 默认值 admin
      - ADMIN_TOKEN=   # 在生产环境中请设置一个强随机值
      # - TZ=Asia/Shanghai
      # - ENABLE_CGROUP_V2=true # 启用后，还需要挂载 /sys/fs/cgrou
    ports:
      - "3100:3100"
    volumes:
      - ./data:/app/data
      # 如需启用 nsjail 的 cgroup 内存限制，需要同时挂载 cgroup
      # - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
      - systempaths=unconfined
    restart: unless-stopped
    # privileged: true
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: callit-redis
    restart: unless-stopped
